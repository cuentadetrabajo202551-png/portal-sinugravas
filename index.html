<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Sinugravas</title>
<style>
:root{
  --blue:#2F6FB6;
  --blue-dark:#24588F;
  --blue-soft:#EAF1FA;
  --accent:#1A73E8;
  --accent-dark:#1257AF;
  --accent-soft:#E8F1FD;
  --white:#FFFFFF;
  --bg:#F4F6F9;
  --gray-dark:#2C3338;
  --gray:#6B7280;
  --gray-soft:#F1F2F4;
  --border:#E3E6EB;
  --green:#27AE60;
  --yellow:#F1C40F;
  --red:#E74C3C;
  --black:#34495E;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 2px 14px rgba(31,45,61,.07);
  --shadow-lg:0 10px 30px rgba(31,45,61,.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--gray-dark);
  height:100vh;
  overflow:hidden;
}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
.hidden{display:none !important;}

/* ---------- LOGIN ---------- */
#loginScreen{
  position:fixed;inset:0;
  background:url('fondo_login.png') center/cover no-repeat, linear-gradient(135deg,var(--blue) 0%, var(--blue-dark) 55%, var(--accent) 130%);
  display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:50;
}
.login-card{
  background:rgba(13,32,61,.86);
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.18);
  width:100%;max-width:410px;
  border-radius:var(--radius);
  box-shadow:0 24px 60px rgba(0,0,0,.45);
  padding:34px 32px 26px;
  text-align:center;
  color:#fff;
}
.login-logo-circle{
  width:84px;height:84px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;box-shadow:0 10px 24px rgba(0,0,0,.3);
  overflow:hidden;padding:12px;
}
.login-logo-circle img{width:100%;height:100%;object-fit:contain;}
.login-welcome{margin:0;font-size:13px;color:rgba(255,255,255,.75);}
.login-title{margin:2px 0 6px;font-size:21px;font-weight:700;color:#fff;}
.login-title .accent{color:var(--accent);}
.login-card p.sub{color:rgba(255,255,255,.65);font-size:13px;margin:0 0 16px;}
.login-divider-accent{width:44px;height:3px;background:var(--accent);margin:0 auto 22px;border-radius:2px;}
#loginScreen .field label{color:rgba(255,255,255,.8);}
.input-icon-wrap{position:relative;}
.input-icon-wrap input{padding-right:38px;}
.input-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;opacity:.75;font-size:13px;padding:6px;}
#loginScreen .field input{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.22);color:#fff;}
#loginScreen .field input::placeholder{color:rgba(255,255,255,.45);}
#loginScreen .field input:focus{border-color:var(--accent);}
.login-extra-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.8);margin:-6px 0 16px;flex-wrap:wrap;gap:6px;}
.remember-row{display:flex;align-items:center;gap:6px;cursor:pointer;}
.remember-row input{width:auto;accent-color:var(--accent);}
.login-extra-row a{color:var(--accent);font-weight:600;}
#loginScreen .btn-outline{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.25);color:#fff;font-size:12px;}
#loginScreen .btn-outline:hover{background:rgba(255,255,255,.16);}
.login-footer{font-size:11px;color:rgba(255,255,255,.55);}
.field{text-align:left;margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--gray);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:14px;color:var(--gray-dark);
  transition:border-color .15s;background:var(--white);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);}
.btn{
  border:none;border-radius:var(--radius-sm);padding:11px 18px;
  font-size:14px;font-weight:600;transition:transform .1s,box-shadow .15s,background .15s;
  display:inline-flex;align-items:center;gap:6px;justify-content:center;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:var(--white);width:100%;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:var(--blue-soft);color:var(--blue-dark);}
.btn-secondary:hover{background:#dbe9f9;}
.btn-outline{background:var(--white);color:var(--gray-dark);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--gray);}
.btn-danger{background:#FDEDEC;color:var(--red);}
.btn-danger:hover{background:#fbdcd9;}
.btn-sm{padding:6px 12px;font-size:12.5px;}
.btn-block{width:100%;}
#loginError{color:var(--red);font-size:13px;margin-top:4px;min-height:18px;}

/* ---------- APP SHELL ---------- */
#app{display:flex;height:100vh;}
.sidebar{
  width:248px;flex-shrink:0;
  background:linear-gradient(180deg,var(--blue-dark),var(--blue));
  color:#fff;display:flex;flex-direction:column;
  padding:20px 14px;transition:transform .25s ease;z-index:40;
}
.sidebar-logo{
  display:flex;align-items:center;justify-content:center;
  background:#fff;border-radius:14px;
  padding:14px 18px;margin:4px 10px 12px;
  box-shadow:0 6px 16px rgba(0,0,0,.2);
}
.sidebar-logo-tag{text-align:center;font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.65);font-weight:700;margin-top:0;margin-bottom:10px;}
.sidebar-nav{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.nav-link{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;
  color:rgba(255,255,255,.82);font-size:13.8px;font-weight:500;transition:background .15s,color .15s;
}
.nav-link:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-link.active{background:var(--accent);color:#fff;font-weight:600;}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-foot{border-top:1px solid rgba(255,255,255,.15);padding-top:12px;margin-top:8px;}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:6px 8px;}
.avatar-mini{
  width:34px;height:34px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;
  overflow:hidden;
}
.avatar-mini img,.avatar-big img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sidebar-user .who{overflow:hidden;}
.sidebar-user .who .n{font-size:12.8px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user .who .r{font-size:11px;color:rgba(255,255,255,.65);}
.logout-link{display:flex;align-items:center;gap:9px;padding:9px 8px;font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;border-radius:10px;}
.logout-link:hover{background:rgba(255,255,255,.08);color:#fff;}

.main-wrapper{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{
  height:62px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex-shrink:0;
}
.topbar .left{display:flex;align-items:center;gap:14px;}
#hamburger{display:none;background:none;border:none;font-size:20px;color:var(--gray-dark);}
.topbar h2{font-size:17px;margin:0;font-weight:700;color:var(--gray-dark);}
.status-pill{
  display:flex;align-items:center;gap:7px;background:var(--gray-soft);
  padding:6px 12px;border-radius:30px;font-size:12.5px;font-weight:600;
}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
#content{flex:1;overflow-y:auto;padding:26px 30px 60px;}
.view{display:none;animation:fadeIn .3s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ---------- generic page bits ---------- */
.page-head{margin-bottom:22px;}
.page-head h1{font-size:22px;margin:0 0 4px;color:var(--gray-dark);}
.page-head p{margin:0;color:var(--gray);font-size:13.5px;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{
  background:var(--white);border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.stat-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stat-card .icon{font-size:20px;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.stat-card .value{font-size:26px;font-weight:800;color:var(--gray-dark);}
.stat-card .label{font-size:12.5px;color:var(--gray);margin-top:2px;}

.panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:22px;margin-bottom:22px;}
.panel h3{margin:0 0 16px;font-size:15.5px;color:var(--gray-dark);}
.panel h4.section-sub{margin:22px 0 12px;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--blue);border-bottom:1px solid var(--border);padding-bottom:6px;}
.panel h4.section-sub:first-child{margin-top:0;}

.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;}
.module-card{
  border-radius:var(--radius);padding:20px;color:#fff;position:relative;overflow:hidden;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;min-height:140px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.module-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.module-card .micon{font-size:26px;margin-bottom:8px;}
.module-card h4{margin:0 0 4px;font-size:15.5px;}
.module-card p{margin:0;font-size:12.5px;opacity:.9;line-height:1.4;}
.module-card .open-link{margin-top:12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;}

.greet-card{
  background:linear-gradient(120deg,var(--blue),var(--blue-dark));
  color:#fff;border-radius:var(--radius);padding:26px 28px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:18px;margin-bottom:24px;box-shadow:var(--shadow-lg);
}
.greet-card .hello{font-size:13.5px;opacity:.85;margin:0 0 2px;}
.greet-card .name{font-size:22px;font-weight:800;margin:0;}
.greet-card .role{font-size:13px;opacity:.85;margin-top:2px;}
.greet-status{background:rgba(255,255,255,.14);border-radius:var(--radius-sm);padding:14px 18px;text-align:right;min-width:190px;}
.greet-status .lbl{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.greet-status .upd{font-size:11.5px;opacity:.8;margin-top:6px;}

.estado-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
.estado-opt{
  border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;
  cursor:pointer;transition:border-color .15s,background .15s;background:var(--white);
}
.estado-opt:hover{border-color:var(--blue);}
.estado-opt.selected{border-color:var(--accent);background:var(--accent-soft);}
.estado-opt .em{font-size:24px;margin-bottom:6px;}
.estado-opt .lb{font-size:12.5px;font-weight:600;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:30px;font-size:12px;font-weight:700;white-space:nowrap;}

table{width:100%;border-collapse:collapse;font-size:13.3px;}
thead th{
  text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--gray);border-bottom:2px solid var(--border);padding:9px 10px;font-weight:700;
}
tbody td{padding:11px 10px;border-bottom:1px solid var(--border);color:var(--gray-dark);vertical-align:middle;}
tbody tr:hover{background:var(--gray-soft);}
.table-wrap{overflow-x:auto;}
.empty-state{text-align:center;padding:34px 10px;color:var(--gray);font-size:13.5px;}
.row-avatar{display:flex;align-items:center;gap:10px;}
.row-avatar .avatar-mini{width:30px;height:30px;font-size:11px;}

.filters-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.filters-bar select,.filters-bar input{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;min-width:140px;}

.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.doc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;text-align:center;box-shadow:var(--shadow);}
.doc-card .di{font-size:28px;margin-bottom:8px;}
.doc-card h5{margin:0 0 10px;font-size:13.5px;}

.comunicado{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);}
.comunicado .meta{font-size:11.5px;color:var(--gray);margin-bottom:6px;}
.comunicado h4{margin:0 0 6px;font-size:14.5px;}
.comunicado p{margin:0;font-size:13.3px;color:var(--gray-dark);line-height:1.5;white-space:pre-wrap;}

.profile-head{display:flex;gap:18px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.avatar-big{width:74px;height:74px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;flex-shrink:0;overflow:hidden;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:18px;}
.info-item{background:var(--gray-soft);border-radius:var(--radius-sm);padding:12px 14px;}
.info-item .l{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.info-item .v{font-size:14px;font-weight:600;color:var(--gray-dark);}

.donut-wrap{display:flex;align-items:center;gap:34px;flex-wrap:wrap;}
.donut{width:170px;height:170px;border-radius:50%;flex-shrink:0;}
.legend{display:flex;flex-direction:column;gap:9px;}
.legend .li{display:flex;align-items:center;gap:9px;font-size:13px;}
.legend .sw{width:11px;height:11px;border-radius:3px;}

.modal-overlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-box{background:var(--white);border-radius:var(--radius);width:100%;max-width:480px;padding:26px;box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto;}
.modal-box.modal-lg{max-width:680px;}
.modal-box h3{margin:0 0 18px;font-size:17px;}
.modal-actions{display:flex;gap:10px;margin-top:8px;justify-content:flex-end;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

#toastContainer{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{background:var(--gray-dark);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-lg);animation:slideIn .25s ease;min-width:220px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.info{background:var(--blue);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

.checkbox-row{display:flex;align-items:center;gap:8px;margin:10px 0;}
.checkbox-row input{width:auto;}

.photo-row{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
.photo-row .avatar-big{width:60px;height:60px;font-size:20px;}

.cert-doc{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:30px 34px;font-size:13.5px;line-height:1.65;color:var(--gray-dark);}
.cert-doc b{color:var(--gray-dark);}
.cert-doc .cert-title{text-align:center;font-weight:800;text-transform:uppercase;margin-bottom:18px;font-size:15px;letter-spacing:.03em;}
.cert-doc .cert-sign{margin-top:34px;}

@media (max-width:900px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  #hamburger{display:block;}
  .greet-card{flex-direction:column;align-items:flex-start;}
  .greet-status{text-align:left;width:100%;}
  .two-col,.three-col{grid-template-columns:1fr;}
}

/* ---------- DASHBOARD ESTILO HERO ---------- */
.sb-badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:10.5px;font-weight:700;}
.bell-wrap{position:relative;cursor:pointer;font-size:18px;color:var(--gray-dark);}
.bell-badge{position:absolute;top:-5px;right:-7px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
.bell-dropdown{position:absolute;top:calc(100% + 14px);right:-12px;width:340px;max-height:420px;overflow-y:auto;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:150;text-align:left;cursor:default;}
.bell-dropdown-header{padding:14px 16px;font-weight:700;font-size:14px;border-bottom:1px solid var(--border);color:var(--gray-dark);}
.bell-dropdown-body{padding:8px;}
.bell-item{display:flex;gap:10px;padding:10px 8px;border-radius:8px;cursor:pointer;}
.bell-item:hover{background:var(--gray-soft);}
.bell-item .ic{font-size:16px;flex-shrink:0;}
.bell-item .title{font-size:12.5px;font-weight:700;color:var(--gray-dark);}
.bell-item .sub{font-size:11.5px;color:var(--gray);margin-top:2px;}
.bell-item .time{font-size:10.5px;color:var(--gray);margin-top:2px;}
.bell-empty{padding:30px 16px;text-align:center;color:var(--gray);font-size:12.5px;}
.bell-dropdown-footer{padding:10px 16px;border-top:1px solid var(--border);text-align:center;}
.bell-dropdown-footer a{font-size:12.5px;font-weight:600;color:var(--accent);cursor:pointer;}

}
.hero-top{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;}
.hero-greet .hello{font-size:13px;opacity:.85;margin:0;}
.hero-greet .name{font-size:23px;font-weight:800;margin:2px 0;}
.hero-greet .role{font-size:13px;opacity:.85;}
.hero-status-pill{background:rgba(255,255,255,.16);border-radius:30px;padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.hero-status-pill .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hero-status-pill .txt small{display:block;font-size:10.5px;font-weight:500;opacity:.8;}
.hero-info-row{position:relative;z-index:1;display:flex;gap:26px;flex-wrap:wrap;}
.hero-info-item{display:flex;align-items:center;gap:9px;font-size:13px;}
.hero-info-item .ic{font-size:17px;opacity:.9;}
.hero-info-item .lbl{font-size:11px;opacity:.7;display:block;}
.hero-info-item .val{font-weight:700;}
.hero-actions{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;}
.hero-actions .btn-outline{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);color:#fff;}
.hero-actions .btn-outline:hover{background:rgba(255,255,255,.18);}
.hero-banner.hero-night::before{content:'';position:absolute;inset:0;z-index:0;
  background:linear-gradient(100deg, rgba(8,14,32,.85) 0%, rgba(8,14,32,.75) 42%, rgba(8,14,32,.4) 72%, rgba(8,14,32,.05) 100%);}
.hero-sky-deco{position:absolute;top:50%;right:0;transform:translateY(-50%);z-index:1;pointer-events:none;}
.hero-sky-day{font-size:30px;filter:drop-shadow(0 0 10px rgba(255,210,90,.6));}
.hero-sky-night{position:relative;font-size:26px;width:60px;height:40px;}
.hero-sky-night .moon{position:absolute;top:0;right:0;filter:drop-shadow(0 0 8px rgba(220,225,255,.5));}
.hero-sky-night .star{position:absolute;color:#fff;font-size:9px;opacity:.85;animation:heroTwinkle 2.4s ease-in-out infinite;}
.hero-sky-night .star.s1{top:2px;left:0;animation-delay:.2s;}
.hero-sky-night .star.s2{top:22px;left:18px;font-size:7px;animation-delay:.9s;}
.hero-sky-night .star.s3{top:14px;left:34px;animation-delay:1.5s;}
@keyframes heroTwinkle{0%,100%{opacity:.25;}50%{opacity:1;}}

.mini-stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px;}
.mini-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;gap:12px;align-items:center;box-shadow:var(--shadow);}
.mini-stat .ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.mini-stat .lbl{font-size:11.5px;color:var(--gray);}
.mini-stat .val{font-size:14.5px;font-weight:700;color:var(--gray-dark);}

.dash-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:18px;align-items:start;}
.dash-grid-2{grid-template-columns:1.2fr 1fr;}
@media (max-width:1100px){.dash-grid{grid-template-columns:1fr;}}

.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.quick-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 10px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow);}
.quick-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.quick-item .circ{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px;color:#fff;}
.quick-item h5{margin:0 0 2px;font-size:12.3px;color:var(--gray-dark);}
.quick-item p{margin:0;font-size:10.6px;color:var(--gray);}
@media (max-width:520px){.quick-grid{grid-template-columns:repeat(2,1fr);}}

.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:18px;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:24px;bottom:0;width:2px;background:var(--border);}
.tl-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#fff;}
.tl-time{font-size:11px;color:var(--gray);margin-bottom:1px;}
.tl-title{font-size:13px;font-weight:600;color:var(--gray-dark);}
.tl-sub{font-size:11.5px;color:var(--gray);}

.mini-card-row{margin-top:14px;}
.mini-card{background:var(--gray-soft);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;}
.mini-card h5{margin:0 0 10px;font-size:13px;color:var(--gray-dark);}
.radial{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--blue);flex-shrink:0;}

/* ---------- RECURSOS (TARJETAS) ---------- */
.resource-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;}
.resource-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:opacity .15s;}
.resource-card.inactive{opacity:.5;}
.resource-card .rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.resource-card .rc-icon{font-size:24px;width:46px;height:46px;border-radius:10px;background:var(--gray-soft);display:flex;align-items:center;justify-content:center;}
.resource-card .rc-actions{display:flex;gap:6px;}
.resource-card .rc-actions button{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--white);font-size:12px;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;}
.resource-card .rc-actions button:hover{border-color:var(--gray);}
.resource-card h4{margin:0 0 4px;font-size:15px;color:var(--gray-dark);}
.resource-card p{margin:0 0 12px;font-size:12.5px;color:var(--gray);line-height:1.4;min-height:16px;}
.resource-card .rc-visible{font-size:11px;color:var(--gray);margin-bottom:12px;}
.icon-pick-preview{width:54px;height:54px;border-radius:12px;background:var(--gray-soft);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px;}
.visible-list{max-height:170px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;}
.visible-list label{display:flex;align-items:center;gap:8px;padding:6px 2px;font-size:13px;cursor:pointer;}
.visible-list label input{width:auto;}
.visible-list .vc{color:var(--gray);font-size:11.5px;margin-left:2px;}

@media (max-width:900px){
  .hero-info-row{gap:16px;}
  .quick-grid{grid-template-columns:repeat(2,1fr);}
}
.global-loader{position:fixed;inset:0;background:rgba(20,30,45,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;gap:14px;}
.global-loader .spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:globalSpin .8s linear infinite;}
.global-loader p{font-size:14px;font-weight:600;letter-spacing:.02em;margin:0;}
@keyframes globalSpin{to{transform:rotate(360deg);}}
</style>
</head>

function estadoMeta(key){ return ESTADOS.find(e=>e.key===key) || {key:escapeHtml(key)||'Sin registro',emoji:'⚪',color:'#9AA3AE'}; }

function uid(p){ return (p||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function fmtDate(d){
  if(!d) return '--';
  return new Date(d+'T00:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateLong(d){
  if(!d) return '--';
  return new Date(d+'T00:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});
}
function fmtDateTime(iso){
  if(!iso) return '--';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '--';
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
}
function calcularEdad(fechaNacimiento){
  if(!fechaNacimiento) return '';
  const nac = new Date(fechaNacimiento+'T00:00:00');
  if(isNaN(nac.getTime())) return '';
  const hoy = new Date();
  let edad = hoy.getFullYear() - nac.getFullYear();
  if(hoy.getMonth() < nac.getMonth() || (hoy.getMonth()===nac.getMonth() && hoy.getDate() < nac.getDate())) edad--;
  return edad;
}
function humanUpdated(iso){
  if(!iso) return 'Sin registro';

  const sameDay = d.toDateString() === new Date().toDateString();
  const time = d.toLocaleTimeString('es-CO',{hour:'numeric',minute:'2-digit'});
  return (sameDay ? 'Hoy, ' : d.toLocaleDateString('es-CO')+', ') + time;
}
function saludo(){
  const h = new Date().getHours();
  if(h < 12) return 'Buenos días';
  if(h < 19) return 'Buenas tardes';
  return 'Buenas noches';
}
function esDeNoche(){
  const h = new Date().getHours();
  return h < 6 || h >= 19;
}
function heroSkyDeco(){
  if(esDeNoche()){
    return `<div class="hero-sky-deco hero-sky-night"><span class="moon">🌙</span><span class="star s1">✦</span><span class="star s2">✧</span><span class="star s3">✦</span></div>`;
  }
  return `<div class="hero-sky-deco hero-sky-day">☀️</div>`;
}
function initials(nombre){
  return escapeHtml((nombre||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''));
}
function hexToRgba(hex, a){
  const v = hex.replace('#','');
  const r = parseInt(v.substring(0,2),16), g = parseInt(v.substring(2,4),16), b = parseInt(v.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function badge(estadoKey){
  const m = estadoMeta(estadoKey);
  return `<span class="badge" style="background:${hexToRgba(m.color,.13)};color:${m.color}">${m.emoji} ${m.key}</span>`;
}
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function statusBadgeGeneric(text, color){
  return `<span class="badge" style="background:${hexToRgba(color,.13)};color:${color}">${text}</span>`;
}
function avatarHtml(u, sizeClass){
  sizeClass = sizeClass || 'avatar-mini';
  if(u.foto) return `<div class="${sizeClass}"><img src="${escapeHtml(u.foto)}" alt=""></div>`;
  return `<div class="${sizeClass}">${initials(u.nombre)}</div>`;
}
function isEmpleadoActivo(u){
  if(u.estado === 'Inactivo') return false;
  if(u.fechaRetiro && u.fechaRetiro <= todayISO()) return false;
  return true;
}
function refreshEstadoActual(){
  const nowStr = todayISO() + 'T' + new Date().toTimeString().slice(0,5);
  let changed = false;
  state.users.forEach(u=>{
    const activos = state.disponibilidad.filter(r => r.usuarioId === u.id);
    const vigente = activos.find(r => {
      const inicio = (r.fechaInicio||r.fecha) + 'T' + (r.horaInicio||'00:00');
      const fin = (r.fechaFin||r.fecha) + 'T' + (r.horaFin||'23:59');
      return nowStr >= inicio && nowStr <= fin;
    });
    const nuevoEstado = vigente ? vigente.estado : SIN_ESTADO.key;
    if(u.estadoActual !== nuevoEstado){
      u.estadoActual = nuevoEstado;
      u.estadoActualizado = nowISO();
      changed = true;
    }
  });
  if(currentUser){
    const fresh = state.users.find(x=>x.id===currentUser.id);
    if(fresh) currentUser.estadoActual = fresh.estadoActual;
  }
}

function empleadoFromRow(e, profile){

    id: e.id, nombre: e.nombre, cedula: e.cedula, cargo: e.cargo,
    estado: e.estado, estadoActual: e.estado_actual || 'Sin estado', estadoActualizado: e.estado_actualizado,

    direccion: e.direccion || '', telefono: e.telefono || '', fechaIngreso: e.fecha_ingreso || '', fechaRetiro: e.fecha_retiro || '',
    motivoRetiro: e.motivo_retiro || '', horasLaborales: e.horas_laborales || '', salario: e.salario || '', horasExtras: e.horas_extras || '',
    proyecto: e.proyecto || '', vehiculo: e.vehiculo || '', municipio: e.municipio || '', departamento: e.departamento || '',
    eps: e.eps || '', afp: e.afp || '', arl: e.arl || '', nivelRiesgo: e.nivel_riesgo || '', notas: e.notas || '',
    authUserId: profile ? profile.id : null,
    correo: profile ? (profile.correo || '') : '',
    rol: profile ? profile.rol : 'Empleado',
  };

let state = emptyState();
async function loadAppData(){
  const [empRes, profRes, dispRes, solRes, comRes, dirRes, certRes, tarRes, alertRes, docRes] = await Promise.all([
    sb.from('empleados').select('*'),
    sb.from('profiles').select('*'),
    sb.from('disponibilidad').select('*'),
    sb.from('solicitudes').select('*'),
    sb.from('comunicados').select('*'),
    sb.from('directorio').select('*'),
    sb.from('cert_config').select('*').eq('id',1).maybeSingle(),
    sb.from('tarjetas').select('*'),
    sb.from('alertas_rh').select('*'),
    sb.from('documentos').select('*'),
  ]);

  const profilesByEmpleado = {};
  (profRes.data||[]).forEach(p=>{ if(p.empleado_id) profilesByEmpleado[p.empleado_id] = p; });

  const users = (empRes.data||[]).map(e => empleadoFromRow(e, profilesByEmpleado[e.id]));

  const disponibilidad = (dispRes.data||[]).map(r => ({
    id:r.id, usuarioId:r.empleado_id, fecha:r.fecha, fechaInicio:r.fecha_inicio, fechaFin:r.fecha_fin,
    horaInicio:r.hora_inicio, horaFin:r.hora_fin, estado:r.estado, observacion:r.observacion,
    adjuntoNombre:r.adjunto_nombre, creadoEn:r.creado_en
  }));

  const solicitudes = (solRes.data||[]).map(s => ({
    id:s.id, empleadoId:s.empleado_id, empleado:s.empleado, fecha:s.fecha, estado:s.estado,
    observacion:s.observacion, certificadoTexto:s.certificado_texto||'', fechaGeneracion:s.fecha_generacion||''
  }));

  const comunicados = (comRes.data||[]).map(c => ({
    id:c.id, titulo:c.titulo, contenido:c.contenido, autor:c.autor, fecha:c.fecha, activo:c.activo
  }));

  const directorio = (dirRes.data||[]).map(d => ({ id:d.id, nombre:d.nombre, cargo:d.cargo, telefono:d.telefono, correo:d.correo }));

  const cc = certRes.data;
  const certConfig = cc
    ? { firmante:cc.firmante||'', cargoFirmante:cc.cargo_firmante||'Representante Legal', nit:cc.nit||'', ciudad:cc.ciudad||'Montería' }
    : { firmante:'', cargoFirmante:'Representante Legal', nit:'', ciudad:'Montería' };

  const tarjetas = (tarRes.data||[]).map(t => ({ id:t.id, icono:t.icono, nombre:t.nombre, descripcion:t.descripcion, url:t.url, visiblePara:t.visible_para||[], activo:t.activo }));

  const alertasRH = (alertRes.data||[]).map(a => ({ id:a.id, tipo:a.tipo, empleadoId:a.empleado_id, empleado:a.empleado, mensaje:a.mensaje, fecha:a.fecha, leido:a.leido }));

  const documentos = (docRes.data||[]).map(d => ({
    id:d.id, empleadoId:d.empleado_id, nombre:d.nombre, icono:d.icono||'📄', storagePath:d.storage_path,
    externalUrl:d.external_url, tipoArchivo:d.tipo_archivo, tamanoBytes:d.tamano_bytes, subidoPor:d.subido_por, createdAt:d.created_at
  }));

  state = { users, disponibilidad, solicitudes, comunicados, directorio, certConfig, tarjetas, alertasRH, documentos };
}

function readPhoto(inputEl, targetId){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById(targetId).value = e.target.result;
    const prev = document.getElementById(targetId+'_preview');
    if(prev) prev.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPassword').value;
  attemptLogin(email, pass);
});
async function attemptLogin(email, pass){
  const errBox = document.getElementById('loginError');
  errBox.textContent = '';
  const submitBtn = document.querySelector('#loginForm button[type="submit"]');
  if(submitBtn) submitBtn.disabled = true;
  showLoader('Iniciando sesión...');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){
    hideLoader();
    errBox.textContent = 'Correo o contraseña incorrectos.';
    if(submitBtn) submitBtn.disabled = false;
    return;
  }
  await finishLogin(errBox);
  hideLoader();
  if(submitBtn) submitBtn.disabled = false;
}
async function finishLogin(errBox){
  await loadAppData();
  const { data:{ user: authUser } } = await sb.auth.getUser();
  const me = authUser ? state.users.find(u => u.authUserId === authUser.id) : null;
  if(!me){
    if(errBox) errBox.textContent = 'Tu cuenta no está vinculada a una ficha de empleado. Contacta a Recursos Humanos.';
    await sb.auth.signOut();
    return;
  }
  if(me.estado !== 'Activo'){
    if(errBox) errBox.textContent = 'Tu usuario está inactivo. Contacta a Recursos Humanos.';
    await sb.auth.signOut();
    return;
  }
  bootApp(me);
}
async function logout(){
  showLoader('Cerrando sesión...');
  await sb.auth.signOut();
  location.reload();
}

let selectedEstado = null;
let selectedAdjuntoNombre = '';
function renderDisponibilidad(){
  selectedEstado = null;
  selectedAdjuntoNombre = '';
  document.getElementById('view-disponibilidad').innerHTML = `
    <div class="page-head"><h1>Mi disponibilidad</h1><p>Selecciona tu estado y el rango de fechas en que aplica.</p></div>
    <div class="panel">
      <div class="estado-grid" id="estadoGrid">

            <div class="em">${e.emoji}</div><div class="lb">${e.key}</div>
          </div>`).join('')}
      </div>
      <div id="estadoFormWrap"></div>
    </div>
  `;
}
function selectEstado(key){
  selectedEstado = key;
  selectedAdjuntoNombre = '';
  document.querySelectorAll('#estadoGrid .estado-opt').forEach(el=>{
    el.classList.toggle('selected', el.dataset.key === key);
  });
  const t = todayISO();
  document.getElementById('estadoFormWrap').innerHTML = `
    <div class="two-col">
      <div class="field"><label>Fecha inicio</label><input type="date" id="estFechaInicio" value="${t}"></div>
      <div class="field"><label>Fecha fin</label><input type="date" id="estFechaFin" value="${t}"></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Hora inicio</label><input type="time" id="estHoraInicio" value="07:00"></div>
      <div class="field"><label>Hora fin</label><input type="time" id="estHoraFin" value="16:00"></div>
    </div>
    <div class="field"><label>Observación (opcional)</label><textarea id="estObs" rows="3" placeholder="Detalles adicionales..."></textarea></div>
    ${key === 'Incapacidad' ? `
    <div class="field">
      <label>Soporte de incapacidad (imagen o PDF)</label>
      <input type="file" id="estAdjunto" accept="image/*,.pdf" onchange="selectedAdjuntoNombre=this.files[0]?this.files[0].name:''; document.getElementById('estAdjuntoNombre').textContent = selectedAdjuntoNombre || 'Ningún archivo seleccionado';">
      <div id="estAdjuntoNombre" style="font-size:12px;color:var(--gray);margin-top:6px;">Ningún archivo seleccionado</div>
      <div style="font-size:11.5px;color:var(--gray);margin-top:4px;">Se notificará automáticamente a Recursos Humanos.</div>
    </div>` : ''}
    <button class="btn btn-primary" onclick="guardarDisponibilidad()">Guardar</button>
  `;
}
async function guardarDisponibilidad(){
  if(!selectedEstado){ toast('Selecciona un estado.','error'); return; }
  const fechaInicio = document.getElementById('estFechaInicio').value;
  const fechaFin = document.getElementById('estFechaFin').value;
  const horaInicio = document.getElementById('estHoraInicio').value;
  const horaFin = document.getElementById('estHoraFin').value;
  const obs = document.getElementById('estObs').value.trim();
  if(!fechaInicio || !fechaFin){ toast('Indica la fecha de inicio y de fin.','error'); return; }
  if(fechaFin < fechaInicio){ toast('La fecha fin no puede ser anterior a la fecha inicio.','error'); return; }
  const adjuntoNombre = selectedEstado==='Incapacidad' ? selectedAdjuntoNombre : '';

  const { data, error } = await sb.from('disponibilidad').insert({
    empleado_id: currentUser.id, fecha: fechaInicio, fecha_inicio: fechaInicio, fecha_fin: fechaFin,
    hora_inicio: horaInicio, hora_fin: horaFin, estado: selectedEstado, observacion: obs, adjunto_nombre: adjuntoNombre
  }).select().single();
  if(error){ toast('No se pudo guardar: '+error.message, 'error'); return; }

  state.disponibilidad.unshift({
    id:data.id, usuarioId:data.empleado_id, fecha:data.fecha, fechaInicio:data.fecha_inicio, fechaFin:data.fecha_fin,
    horaInicio:data.hora_inicio, horaFin:data.hora_fin, estado:data.estado, observacion:data.observacion,
    adjuntoNombre:data.adjunto_nombre, creadoEn:data.creado_en
  });

  if(selectedEstado === 'Incapacidad'){
    const mensaje = `Incapacidad del ${fmtDate(fechaInicio)} al ${fmtDate(fechaFin)}${adjuntoNombre?' · adjunto: '+adjuntoNombre:' · sin documento adjunto'}`;
    await sb.from('alertas_rh').insert({
      tipo:'Incapacidad', empleado_id: currentUser.id, empleado: currentUser.nombre, mensaje, fecha: todayISO(), leido:false
    });
    toast('Incapacidad registrada y notificada a Recursos Humanos.');
  } else {
    toast('Disponibilidad actualizada correctamente.');
  }
  refreshEstadoActual();
  updateTopbarStatus();
  showView('inicio');
}

}
function abrirModalTarjeta(id){
  const t = id ? state.tarjetas.find(x=>x.id===id) : null;
  const empleados = state.users.filter(u=>u.rol==='Empleado');
  openModal(`
    <h3>${t?'Editar tarjeta':'Nueva tarjeta'}</h3>
    <div class="field"><label>Ícono (un emoji)</label>
      <div class="icon-pick-preview" id="tIconPreview">${t?escapeHtml(t.icono):'🔗'}</div>
      <input type="text" id="tIcono" value="${t?escapeHtml(t.icono):'🔗'}" maxlength="2" oninput="document.getElementById('tIconPreview').textContent=this.value||'🔗'">
    </div>
    <div class="field"><label>Nombre</label><input type="text" id="tNombre" value="${t?escapeHtml(t.nombre):''}" placeholder="Ej: Formulario de inspección"></div>
    <div class="field"><label>Descripción (opcional)</label><input type="text" id="tDescripcion" value="${t?escapeHtml(t.descripcion||''):''}" placeholder="Ej: Diligenciar antes de cada turno"></div>
    <div class="field"><label>URL</label><input type="text" id="tUrl" value="${t?escapeHtml(t.url):''}" placeholder="https://..."></div>
    <div class="field"><label>Visible para <span style="color:var(--gray);font-weight:400;">(deja todo sin marcar = visible para todos)</span></label>
      <div class="visible-list">
        ${empleados.length ? empleados.map(eu=>`
          <label><input type="checkbox" value="${eu.id}" ${t&&t.visiblePara&&t.visiblePara.includes(eu.id)?'checked':''}> ${escapeHtml(eu.nombre)} <span class="vc">${escapeHtml(eu.cargo)}</span></label>
        `).join('') : `<div class="empty-state">No hay empleados registrados aún.</div>`}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarTarjeta('${id||''}')">Guardar</button>
    </div>
  `, true);
}
async function guardarTarjeta(id){
  const icono = document.getElementById('tIcono').value.trim() || '🔗';
  const nombre = document.getElementById('tNombre').value.trim();
  const descripcion = document.getElementById('tDescripcion').value.trim();
  const url = document.getElementById('tUrl').value.trim();
  const visiblePara = Array.from(document.querySelectorAll('.visible-list input:checked')).map(el=>el.value);
  if(!nombre || !url){ toast('Completa nombre y URL.','error'); return; }
  if(id){
    const { error } = await sb.from('tarjetas').update({
      icono, nombre, descripcion, url, visible_para: visiblePara
    }).eq('id', id);
    if(error){ toast('No se pudo actualizar: '+error.message,'error'); return; }
    Object.assign(state.tarjetas.find(x=>x.id===id), {icono,nombre,descripcion,url,visiblePara});
    toast('Tarjeta actualizada.');
  } else {
    const { data, error } = await sb.from('tarjetas').insert({
      icono, nombre, descripcion, url, visible_para: visiblePara, activo:true
    }).select().single();
    if(error){ toast('No se pudo crear: '+error.message,'error'); return; }
    state.tarjetas.push({id:data.id, icono:data.icono, nombre:data.nombre, descripcion:data.descripcion, url:data.url, visiblePara:data.visible_para||[], activo:data.activo});
    toast('Tarjeta creada.');
  }
  closeModal();
  pintarTarjetasRH();
}
async function toggleTarjetaActiva(id){
  const t = state.tarjetas.find(x=>x.id===id);
  const nuevoActivo = t.activo===false ? true : false;
  const { error } = await sb.from('tarjetas').update({ activo: nuevoActivo }).eq('id', id);
  if(error){ toast('No se pudo actualizar: '+error.message,'error'); return; }
  t.activo = nuevoActivo;
  pintarTarjetasRH();
}
async function eliminarTarjeta(id){
  if(!confirm('¿Eliminar esta tarjeta?')) return;
  const { error } = await sb.from('tarjetas').delete().eq('id', id);
  if(error){ toast('No se pudo eliminar: '+error.message,'error'); return; }
  state.tarjetas = state.tarjetas.filter(x=>x.id!==id);
  pintarTarjetasRH();
}

      <label>O pega un enlace <span style="color:var(--gray);font-weight:400;">(para archivos de más de 15 MB: súbelo a Google Drive, OneDrive, etc. con acceso "cualquiera con el link" y pega aquí esa dirección)</span></label>
      <input type="text" id="docUrl" placeholder="https://drive.google.com/...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarDocumentoGeneral()">Subir</button>
    </div>
  `);
}
function checkDocArchivoSize(inputEl){
  const file = inputEl.files[0];
  const warn = document.getElementById('docArchivoWarning');
  if(!file){ warn.style.display='none'; return; }
  if(file.size > 15*1024*1024){
    warn.textContent = `Este archivo pesa ${(file.size/1024/1024).toFixed(1)} MB, supera el límite de 15 MB. Súbelo a una nube y pega el enlace abajo en su lugar.`;
    warn.style.display = 'block';
    inputEl.value = '';
  } else {
    warn.style.display = 'none';
  }
}
async function guardarDocumentoGeneral(){
  const icono = document.getElementById('docIcono').value.trim() || '📄';
  const nombre = document.getElementById('docNombre').value.trim();
  const file = document.getElementById('docArchivo').files[0];
  const url = document.getElementById('docUrl').value.trim();
  if(!nombre){ toast('Escribe un nombre para el documento.','error'); return; }
  if(!file && !url){ toast('Selecciona un archivo o pega un enlace.','error'); return; }
  if(file && file.size > 15*1024*1024){ toast('El archivo supera 15 MB. Súbelo a una nube y pega el enlace en su lugar.','error'); return; }

  const insertData = { empleado_id: null, nombre, icono, subido_por: currentUser.nombre };
  if(file){
    const path = `general/${Date.now()}_${file.name}`;
    const { error: upErr } = await sb.storage.from('documentos').upload(path, file);
    if(upErr){ toast('No se pudo subir el archivo: '+upErr.message,'error'); return; }
    insertData.storage_path = path;
    insertData.tipo_archivo = file.type;
    insertData.tamano_bytes = file.size;
  } else {
    insertData.external_url = url;
  }

  const { data, error } = await sb.from('documentos').insert(insertData).select().single();
  if(error){ toast('No se pudo guardar: '+error.message,'error'); return; }
  state.documentos.push({
    id:data.id, empleadoId:null, nombre:data.nombre, icono:data.icono, storagePath:data.storage_path,
    externalUrl:data.external_url, tipoArchivo:data.tipo_archivo, tamanoBytes:data.tamano_bytes, subidoPor:data.subido_por, createdAt:data.created_at
  });
  toast('Documento agregado.');
  closeModal();
  pintarDocumentosGenerales();
}
async function eliminarDocumentoGeneral(id){
  if(!confirm('¿Eliminar este documento?')) return;
  const d = state.documentos.find(x=>x.id===id);
  if(!d) return;
  if(d.storagePath) await sb.storage.from('documentos').remove([d.storagePath]);
  const { error } = await sb.from('documentos').delete().eq('id', id);
  if(error){ toast('No se pudo eliminar: '+error.message,'error'); return; }
  state.documentos = state.documentos.filter(x=>x.id!==id);
  toast('Documento eliminado.');
  pintarDocumentosGenerales();
}

  const direccion = document.getElementById('perfilDireccion').value.trim();

  let msg = 'Perfil actualizado.';

                    : 'Perfil actualizado. Revisa tu correo para confirmar el cambio de dirección de acceso.';

  currentUser = u;

  openModal(`

      <button class="btn btn-primary" onclick="guardarPassword()">Guardar</button>

  `);

async function guardarPassword(){
  if(currentUser.rol !== 'Recursos Humanos'){ toast('Contacta a Recursos Humanos para cambiar tu contraseña.','error'); return; }
  const actual = document.getElementById('pwActual').value;
  const nueva = document.getElementById('pwNueva').value;
  const confirma = document.getElementById('pwConfirma').value;
  if(!nueva || nueva.length < 6){ toast('La nueva contraseña debe tener al menos 6 caracteres.','error'); return; }
  if(nueva !== confirma){ toast('Las contraseñas no coinciden.','error'); return; }

  const { error: reauthErr } = await sb.auth.signInWithPassword({ email: currentUser.correo, password: actual });
  if(reauthErr){ toast('La contraseña actual no es correcta.','error'); return; }

  const { error } = await sb.auth.updateUser({ password: nueva });
  if(error){ toast('No se pudo actualizar la contraseña: '+error.message,'error'); return; }

  closeModal();
  toast('Contraseña actualizada correctamente.');
}

/* =========================== UTILIDAD: EXPORTAR XLS =========================== */
function xlsxEscape(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function xlsxColLetter(n){
  let s=''; n++;
  while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); }
  return s;
}
function xlsxBuildSheetXML(headers, rows){
  let xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><cols><col min="1" max="20" width="20" customWidth="1"/></cols><sheetData>';
  xml += '<row r="1">' + headers.map((h,i)=>`<c r="${xlsxColLetter(i)}1" t="inlineStr" s="1"><is><t>${xlsxEscape(h)}</t></is></c>`).join('') + '</row>';
  rows.forEach((r,ri)=>{
    const rowNum = ri+2;
    xml += `<row r="${rowNum}">` + r.map((v,ci)=>{
      const cellRef = xlsxColLetter(ci)+rowNum;
      if(typeof v === 'number' && isFinite(v)) return `<c r="${cellRef}"><v>${v}</v></c>`;
      return `<c r="${cellRef}" t="inlineStr"><is><t>${xlsxEscape(v==null?'':v)}</t></is></c>`;
    }).join('') + '</row>';
  });
  xml += '</sheetData></worksheet>';
  return xml;
}
function xlsxCrc32(bytes){
  let crc = 0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++){
    crc ^= bytes[i];
    for(let j=0;j<8;j++){ crc = (crc & 1) ? (crc >>> 1) ^ 0xEDB88320 : (crc >>> 1); }
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function xlsxU16(n){ return [n&0xFF,(n>>>8)&0xFF]; }
function xlsxU32(n){ return [n&0xFF,(n>>>8)&0xFF,(n>>>16)&0xFF,(n>>>24)&0xFF]; }
function xlsxConcatBytes(arrays){
  let total = 0; arrays.forEach(a=>total+=a.length);
  const out = new Uint8Array(total);
  let off=0; arrays.forEach(a=>{ out.set(a, off); off+=a.length; });
  return out;
}
function xlsxDosDateTime(d){
  const time = ((d.getHours()&0x1F)<<11) | ((d.getMinutes()&0x3F)<<5) | ((Math.floor(d.getSeconds()/2))&0x1F);
  const date = (((d.getFullYear()-1980)&0x7F)<<9) | (((d.getMonth()+1)&0xF)<<5) | (d.getDate()&0x1F);
  return {time, date};
}
function xlsxBuildZip(files){
  let offset = 0;
  const localParts = [], centralParts = [];
  const dt = xlsxDosDateTime(new Date());
  files.forEach(f=>{
    const nameBytes = new TextEncoder().encode(f.name);
    const data = f.data;
    const crc = xlsxCrc32(data);
    const size = data.length;
    const localHeaderBytes = new Uint8Array([].concat(
      xlsxU32(0x04034b50), xlsxU16(20), xlsxU16(0), xlsxU16(0),
      xlsxU16(dt.time), xlsxU16(dt.date),
      xlsxU32(crc), xlsxU32(size), xlsxU32(size),
      xlsxU16(nameBytes.length), xlsxU16(0)
    ));
    const localEntry = xlsxConcatBytes([localHeaderBytes, nameBytes, data]);
    localParts.push(localEntry);
    const centralHeaderBytes = new Uint8Array([].concat(
      xlsxU32(0x02014b50), xlsxU16(20), xlsxU16(20), xlsxU16(0), xlsxU16(0),
      xlsxU16(dt.time), xlsxU16(dt.date),
      xlsxU32(crc), xlsxU32(size), xlsxU32(size),
      xlsxU16(nameBytes.length), xlsxU16(0), xlsxU16(0), xlsxU16(0), xlsxU16(0), xlsxU32(0),
      xlsxU32(offset)
    ));
    centralParts.push(xlsxConcatBytes([centralHeaderBytes, nameBytes]));
    offset += localEntry.length;
  });
  const centralDirOffset = offset;
  const centralDirBytes = xlsxConcatBytes(centralParts);
  const eocd = new Uint8Array([].concat(
    xlsxU32(0x06054b50), xlsxU16(0), xlsxU16(0),
    xlsxU16(files.length), xlsxU16(files.length),
    xlsxU32(centralDirBytes.length), xlsxU32(centralDirOffset), xlsxU16(0)
  ));
  return xlsxConcatBytes([...localParts, centralDirBytes, eocd]);
}
function buildXLSXBytes(headers, rows, sheetName){
  sheetName = sheetName || 'Hoja1';
  const enc = new TextEncoder();
  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`;
  const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;
  const workbookXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="${xlsxEscape(sheetName)}" sheetId="1" r:id="rId1"/></sheets></workbook>`;
  const workbookRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`;
  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts><fills count="1"><fill><patternFill patternType="none"/></fill></fills><borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="2"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs></styleSheet>`;
  const sheetXml = xlsxBuildSheetXML(headers, rows);
  const files = [
    {name:'[Content_Types].xml', data: enc.encode(contentTypes)},
    {name:'_rels/.rels', data: enc.encode(rootRels)},
    {name:'xl/workbook.xml', data: enc.encode(workbookXml)},
    {name:'xl/_rels/workbook.xml.rels', data: enc.encode(workbookRels)},
    {name:'xl/styles.xml', data: enc.encode(stylesXml)},
    {name:'xl/worksheets/sheet1.xml', data: enc.encode(sheetXml)},
  ];
  return xlsxBuildZip(files);
}
function descargarXLSX(headers, rows, filename, sheetName){
  const zipBytes = buildXLSXBytes(headers, rows, sheetName);
  const blob = new Blob([zipBytes], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename+'_'+todayISO()+'.xlsx'; a.click();
}

function sanitizeNombreArchivo(s){
  return String(s||'').replace(/[\\/:*?"<>|]/g, '-').trim() || 'archivo';
}
async function descargarBackupGeneral(){
  showLoader('Generando copia de seguridad...');
  try{
    const usersPorCedula = state.users.slice().sort((a,b)=>(a.cedula||'').localeCompare(b.cedula||''));

    const headersEmp = ['Proyecto/Ubicación','Nombre completo','Cédula','Vehículo asignado','Fecha de ingreso','Fecha de retiro','Motivo de retiro','Estado','Género','Fecha de nacimiento','Edad','Nivel de escolaridad','Dirección','Celular','Cargo','Municipio de trabajo','Departamento','Horas laborales','Salario','Horas extras','EPS','AFP','ARL','Nivel de riesgo','Correo','Notas'];
    const rowsEmp = usersPorCedula.map(u=>[
      u.proyecto||'', u.nombre, u.cedula, u.vehiculo||'',
      u.fechaIngreso||'', u.fechaRetiro||'', u.motivoRetiro||'', u.estado||'',
      u.genero||'', u.fechaNacimiento||'', calcularEdad(u.fechaNacimiento), u.escolaridad||'',
      u.direccion||'', u.telefono||'', u.cargo||'', u.municipio||'', u.departamento||'',
      u.horasLaborales||'', u.salario||'', u.horasExtras||'',
      u.eps||'', u.afp||'', u.arl||'', u.nivelRiesgo||'', u.correo||'', u.notas||''
    ]);
    const empleadosXlsxBytes = buildXLSXBytes(headersEmp, rowsEmp, 'Empleados');

    const headersReg = ['Empleado','Cédula','Reportado el','Desde','Hasta','Hora inicio','Hora fin','Estado','Observación','Adjunto'];
    const rowsReg = state.disponibilidad.slice().map(r=>{
      const u = state.users.find(x=>x.id===r.usuarioId);
      return { cedula: u?u.cedula:'', fila:[u?u.nombre:'--', u?u.cedula:'--', fmtDateTime(r.creadoEn), r.fechaInicio||r.fecha, r.fechaFin||r.fecha, r.horaInicio||'', r.horaFin||'', r.estado||'', r.observacion||'', r.adjuntoNombre||''] };
    }).sort((a,b)=>(a.cedula||'').localeCompare(b.cedula||'')).map(x=>x.fila);
    const registroXlsxBytes = buildXLSXBytes(headersReg, rowsReg, 'Registro de estado');

    const zipFiles = [
      { name: 'empleados.xlsx', data: empleadosXlsxBytes },
      { name: 'registro_estados.xlsx', data: registroXlsxBytes },
    ];

    const privados = state.documentos
      .filter(d=>d.empleadoId)
      .map(d=>({ doc:d, u: state.users.find(x=>x.id===d.empleadoId) }))
      .sort((a,b)=>(a.u?a.u.cedula:'').localeCompare(b.u?b.u.cedula:''));

    for(const { doc, u } of privados){
      const carpeta = sanitizeNombreArchivo(`${u?u.cedula:'sin_cedula'} - ${u?u.nombre:'desconocido'}`);
      if(doc.storagePath){
        const { data, error } = await sb.storage.from('documentos').download(doc.storagePath);
        if(!error && data){
          const bytes = new Uint8Array(await data.arrayBuffer());
          zipFiles.push({ name: `adjuntos/${carpeta}/${sanitizeNombreArchivo(doc.nombre)}`, data: bytes });
        }
      } else if(doc.externalUrl){
        const enc = new TextEncoder();
        const contenido = `Enlace externo: ${doc.nombre}\n${doc.externalUrl}\n`;
        zipFiles.push({ name: `adjuntos/${carpeta}/ENLACE - ${sanitizeNombreArchivo(doc.nombre)}.txt`, data: enc.encode(contenido) });
      }
    }

    const zipBytes = xlsxBuildZip(zipFiles);
    const blob = new Blob([zipBytes], {type:'application/zip'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_sinugravas_${todayISO()}.zip`;
    a.click();
    toast('Copia de seguridad generada.');
  } catch(e){
    toast('No se pudo generar la copia de seguridad: '+(e && e.message ? e.message : e), 'error');
  } finally {
    hideLoader();
  }
}

async function subirDocumentoEmpleado(empleadoId, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const statusEl = document.getElementById('docUploadStatus');
  if(statusEl) statusEl.textContent = 'Subiendo...';
  const path = `${empleadoId}/${Date.now()}_${file.name}`;
  const { error: upErr } = await sb.storage.from('documentos').upload(path, file);
  if(upErr){ toast('No se pudo subir el archivo: '+upErr.message,'error'); if(statusEl) statusEl.textContent=''; return; }
  const { data, error } = await sb.from('documentos').insert({
    empleado_id: empleadoId, nombre: file.name, storage_path: path,
    tipo_archivo: file.type, tamano_bytes: file.size, subido_por: currentUser.nombre
  }).select().single();
  if(error){ toast('No se pudo guardar el registro: '+error.message,'error'); if(statusEl) statusEl.textContent=''; return; }
  state.documentos.push({
    id:data.id, empleadoId:data.empleado_id, nombre:data.nombre, storagePath:data.storage_path,
    tipoArchivo:data.tipo_archivo, tamanoBytes:data.tamano_bytes, subidoPor:data.subido_por, createdAt:data.created_at
  });
  toast('Documento subido correctamente.');
  verEmpleado(empleadoId);
}
async function eliminarDocumentoEmpleado(id, empleadoId){
  if(!confirm('¿Eliminar este documento?')) return;
  const d = state.documentos.find(x=>x.id===id);
  if(!d) return;
  await sb.storage.from('documentos').remove([d.storagePath]);
  const { error } = await sb.from('documentos').delete().eq('id', id);
  if(error){ toast('No se pudo eliminar: '+error.message,'error'); return; }
  state.documentos = state.documentos.filter(x=>x.id!==id);
  toast('Documento eliminado.');
  verEmpleado(empleadoId);
}

async function guardarEmpleado(id){
  const nombre = document.getElementById('eNombre').value.trim();
  const cedula = document.getElementById('eCedula').value.trim();
  const cargo = document.getElementById('eCargo').value.trim();
  const genero = document.getElementById('eGenero').value;
  const fechaNacimiento = document.getElementById('eFechaNacimiento').value;
  const fechaIngreso = document.getElementById('eFechaIngreso').value;
  if(!nombre || !cedula || !cargo || !fechaNacimiento || !fechaIngreso){ toast('Completa los campos obligatorios: nombre, cédula, cargo, fecha de nacimiento y fecha de ingreso.','error'); return; }
  const fechaRetiro = document.getElementById('eFechaRetiro').value;
  const data = {
    nombre, cedula, cargo, genero,
    fecha_nacimiento: fechaNacimiento, fecha_ingreso: fechaIngreso,
    foto: document.getElementById('eFoto').value,
    escolaridad: document.getElementById('eEscolaridad').value,
    direccion: document.getElementById('eDireccion').value.trim(),
    telefono: document.getElementById('eTelefono').value.trim(),
    estado: fechaRetiro ? 'Inactivo' : document.getElementById('eEstado').value,
    fecha_retiro: fechaRetiro || null,
    motivo_retiro: document.getElementById('eMotivoRetiro').value,
    horas_laborales: document.getElementById('eHorasLaborales').value,
    salario: document.getElementById('eSalario').value.trim(),
    horas_extras: document.getElementById('eHorasExtras').value.trim(),
    proyecto: document.getElementById('eProyecto').value.trim(),
    vehiculo: document.getElementById('eVehiculo').value.trim(),
    municipio: document.getElementById('eMunicipio').value.trim(),
    departamento: document.getElementById('eDepartamento').value.trim(),
    eps: document.getElementById('eEps').value.trim(),
    afp: document.getElementById('eAfp').value.trim(),
    arl: document.getElementById('eArl').value.trim(),
    nivel_riesgo: document.getElementById('eNivelRiesgo').value,
    notas: document.getElementById('eNotas').value.trim(),
  };
  if(id){
    const existing = state.users.find(x=>x.id===id);
    const { data: row, error } = await sb.from('empleados').update(data).eq('id', id).select().single();
    if(error){ toast('No se pudo actualizar: '+error.message,'error'); return; }
    const profile = existing.authUserId ? { id: existing.authUserId, correo: existing.correo, rol: existing.rol } : null;
    Object.assign(existing, empleadoFromRow(row, profile));
    toast('Empleado actualizado.');
  } else {
    const { data: row, error } = await sb.from('empleados').insert(data).select().single();
    if(error){ toast('No se pudo crear: '+error.message,'error'); return; }
    state.users.push(empleadoFromRow(row, null));
    toast('Empleado creado.');
  }
  closeModal();
  pintarEmpleados();
}
async function resetearPassword(id){
  const u = state.users.find(x=>x.id===id);
  if(!u.authUserId){ toast('Este empleado no tiene acceso al portal.','error'); return; }
  const temp = 'sinu' + Math.floor(1000+Math.random()*9000);
  const result = await callManageAccess({ action:'resetPassword', userId: u.authUserId, password: temp });
  if(!result.ok){ toast('No se pudo restablecer: '+result.error,'error'); return; }
  toast(`Nueva contraseña temporal para ${u.nombre}: ${temp}`, 'info');
  if(document.getElementById('view-usuarios').classList.contains('active')) pintarUsuarios();
}
async function eliminarEmpleado(id){
  const u = state.users.find(x=>x.id===id);
  if(u.id === currentUser.id){ toast('No puedes eliminar tu propio usuario.','error'); return; }
  if(u.authUserId){ toast('Primero quita su acceso al portal desde "Usuarios".','error'); return; }
  if(!confirm(`¿Eliminar a ${u.nombre}? Esta acción no se puede deshacer.`)) return;
  const { error } = await sb.from('empleados').delete().eq('id', id);
  if(error){ toast('No se pudo eliminar: '+error.message,'error'); return; }
  state.users = state.users.filter(x=>x.id!==id);
  pintarEmpleados();
  toast('Empleado eliminado.');
  closeModal();
}

async function callManageAccess(payload){
  const { data, error } = await sb.functions.invoke('manage-access', { body: payload });
  if(error){
    let msg = error.message || 'Error al gestionar el acceso.';
    if(error.context && typeof error.context.json === 'function'){
      try{ const body = await error.context.json(); if(body && body.error) msg = body.error; } catch(e){}
    }
    return { ok:false, error: msg };
  }
  if(data && data.error) return { ok:false, error:data.error };
  return { ok:true, data };
}

async function guardarAcceso(id){
  const editing = !!id;
  let targetId = id;
  if(!editing){
    const sel = document.getElementById('accEmpleadoId');
    targetId = sel ? sel.value : '';
    if(!targetId){ toast('Selecciona un empleado.','error'); return; }
  }
  const u = state.users.find(x=>x.id===targetId);
  const correo = document.getElementById('accCorreo').value.trim().toLowerCase();
  const password = document.getElementById('accPassword').value;
  const rol = document.getElementById('accRol').value;

  if(editing){
    if(password && password.length < 6){ toast('La contraseña debe tener al menos 6 caracteres.','error'); return; }
    const result = await callManageAccess({ action:'update', userId: u.authUserId, password: password||undefined, rol });
    if(!result.ok){ toast('No se pudo guardar: '+result.error,'error'); return; }
    u.rol = rol;
    toast('Acceso actualizado.');
  } else {
    if(!correo || !password){ toast('Completa correo y contraseña.','error'); return; }
    if(password.length < 6){ toast('La contraseña debe tener al menos 6 caracteres.','error'); return; }
    const result = await callManageAccess({ action:'create', empleadoId: targetId, correo, password, rol });
    if(!result.ok){ toast('No se pudo crear el usuario: '+result.error,'error'); return; }
    u.correo = correo; u.rol = rol; u.authUserId = result.data && result.data.userId;
    toast('Usuario creado correctamente.');
  }
  closeModal();
  pintarUsuarios();
}
async function quitarAcceso(id){
  const u = state.users.find(x=>x.id===id);
  if(u.id === currentUser.id){ toast('No puedes quitar tu propio acceso.','error'); return; }
  if(!confirm(`¿Quitar el acceso al portal de ${u.nombre}? Ya no podrá iniciar sesión.`)) return;
  const result = await callManageAccess({ action:'remove', userId: u.authUserId });
  if(!result.ok){ toast('No se pudo quitar el acceso: '+result.error,'error'); return; }
  u.correo = ''; u.rol = 'Empleado'; u.authUserId = null;
  pintarUsuarios();
  toast('Acceso eliminado.');
}

/* =========================== RH: CERTIFICADOS (SOLICITUDES) =========================== */
function renderSolicitudes(){
  document.getElementById('view-solicitudes').innerHTML = `
    <div class="page-head"><h1>Certificados laborales</h1><p>Genera certificados a partir de las solicitudes de los empleados.</p></div>
    <div class="panel">
      <div class="filters-bar">
        <select id="solFiltro" onchange="pintarSolicitudes()">
          <option value="">Todos los estados</option>
          <option>Pendiente</option><option>Generado</option>
        </select>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Empleado</th><th>Fecha solicitud</th><th>Observación</th><th>Estado</th><th></th></tr></thead>
        <tbody id="solTbody"></tbody>
      </table></div>
    </div>
  `;
  pintarSolicitudes();
}
function pintarSolicitudes(){
  const est = document.getElementById('solFiltro').value;
  let rows = state.solicitudes.slice().sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(est) rows = rows.filter(r=>r.estado===est);
  document.getElementById('solTbody').innerHTML = rows.length ? rows.map(s=>`
    <tr><td>${escapeHtml(s.empleado)}</td><td>${fmtDate(s.fecha)}</td><td>${escapeHtml(s.observacion)||'--'}</td><td>${solicitudBadge(s.estado)}</td>
    <td>${s.estado==='Pendiente'
      ? `<button class="btn btn-primary btn-sm" onclick="abrirGeneradorCertificado('${s.id}')">Generar certificado</button>`
      : `<button class="btn btn-outline btn-sm" onclick="verCertificadoGenerado('${s.id}')">Ver certificado</button>`}
    </td></tr>
  `).join('') : `<tr><td colspan="5"><div class="empty-state">No hay solicitudes con este filtro.</div></td></tr>`;
}
function abrirGeneradorCertificado(id){
  const s = state.solicitudes.find(x=>x.id===id);
  const u = state.users.find(x=>x.id===s.empleadoId);
  const cfg = state.certConfig;
  openModal(`
    <h3>Generar certificado — ${escapeHtml(u.nombre)}</h3>
    <h4 class="section-sub">Datos de la empresa</h4>
    <div class="three-col">
      <div class="field"><label>Firmante / Representante legal</label><input type="text" id="certFirmante" value="${escapeHtml(cfg.firmante)}" oninput="certUpdatePreview('${id}')"></div>
      <div class="field"><label>Cargo del firmante</label><input type="text" id="certCargoFirmante" value="${escapeHtml(cfg.cargoFirmante)}" oninput="certUpdatePreview('${id}')"></div>
      <div class="field"><label>NIT</label><input type="text" id="certNit" value="${escapeHtml(cfg.nit)}" oninput="certUpdatePreview('${id}')"></div>
    </div>
    <h4 class="section-sub">Opciones del certificado</h4>
    <div class="two-col">
      <div class="field"><label>Fecha del certificado</label><input type="date" id="certFecha" value="${todayISO()}" oninput="certUpdatePreview('${id}')"></div>
      <div class="field"><label>Ciudad</label><input type="text" id="certCiudad" value="${escapeHtml(cfg.ciudad)}" oninput="certUpdatePreview('${id}')"></div>
    </div>
    <div class="checkbox-row"><input type="checkbox" id="certIncSalario" checked onchange="certUpdatePreview('${id}')"> <label style="margin:0;">Incluir salario en el certificado</label></div>
    <div class="checkbox-row"><input type="checkbox" id="certIncHoras" checked onchange="certUpdatePreview('${id}')"> <label style="margin:0;">Incluir horas laborales</label></div>
    <div class="field"><label>Observaciones (opcional)</label><textarea id="certObsGen" rows="2" oninput="certUpdatePreview('${id}')">${escapeHtml(s.observacion)}</textarea></div>

    <h4 class="section-sub">Vista previa</h4>
    <div class="cert-doc" id="certPreview"></div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCertificado('${id}')">Generar y enviar</button>
    </div>
  `, true);
  certUpdatePreview(id);
}
function buildCertificadoTexto(s, u){
  const firmante = document.getElementById('certFirmante').value.trim();
  const cargoFirmante = document.getElementById('certCargoFirmante').value.trim();
  const nit = document.getElementById('certNit').value.trim();
  const ciudad = document.getElementById('certCiudad').value.trim() || 'Montería';
  const fecha = document.getElementById('certFecha').value || todayISO();
  const incSalario = document.getElementById('certIncSalario').checked;
  const incHoras = document.getElementById('certIncHoras').checked;
  const obs = document.getElementById('certObsGen').value.trim();
  state.certConfig.firmante = firmante; state.certConfig.cargoFirmante = cargoFirmante; state.certConfig.nit = nit; state.certConfig.ciudad = ciudad;

  const activo = isEmpleadoActivo(u);
  let body = `<div style="text-align:center;margin-bottom:10px;"><img class="cert-logo" src="${LOGO_DATA_URI}" style="max-width:160px;max-height:80px;object-fit:contain;"></div>`;
  body += `<div class="cert-title">Certificación Laboral</div>`;
  body += `<p>SINUGRAVAS S.A.S.${nit?', NIT '+nit:''}, EN CUMPLIMIENTO DEL NUMERAL 7 DEL ARTÍCULO 57 DEL CÓDIGO SUSTANTIVO DEL TRABAJO,</p>`;
  body += `<p style="text-align:center;font-weight:700;">CERTIFICA QUE:</p>`;
  body += activo
    ? `<p>El (la) señor (a) <b>${escapeHtml(u.nombre.toUpperCase())}</b>, identificado(a) con cédula de ciudadanía No. <b>${escapeHtml(u.cedula)}</b>, se encuentra actualmente vinculado(a) laboralmente con nuestra empresa, desempeñando el cargo de <b>${escapeHtml((u.cargo||'').toUpperCase())}</b>, desde el ${fmtDateLong(u.fechaIngreso)} a la fecha.</p>`
    : `<p>El (la) señor (a) <b>${escapeHtml(u.nombre.toUpperCase())}</b>, identificado(a) con cédula de ciudadanía No. <b>${escapeHtml(u.cedula)}</b>, laboró para nuestra empresa desempeñando el cargo de <b>${escapeHtml((u.cargo||'').toUpperCase())}</b>, desde el ${fmtDateLong(u.fechaIngreso)}${u.fechaRetiro? ' hasta el '+fmtDateLong(u.fechaRetiro) : ''}.</p>`;
  if(incSalario && u.salario) body += `<p>${activo?'Devenga':'Devengaba'} un salario mensual de <b>$${Number(u.salario).toLocaleString('es-CO')}</b>.</p>`;
  if(incHoras && u.horasLaborales) body += `<p>${activo?'Cumple':'Cumplía'} una jornada laboral de <b>${escapeHtml(u.horasLaborales)}</b>.</p>`;
  if(obs) body += `<p><b>OBSERVACIONES:</b> ${escapeHtml(obs)}</p>`;
  body += `<p>La presente certificación se expide a solicitud del interesado en ${escapeHtml(ciudad)}, el ${fmtDateLong(fecha)}.</p>`;
  body += `<div class="cert-sign">Cordialmente,<br><br><br>
    <b>${escapeHtml(firmante) || '________________________'}</b><br>
    ${escapeHtml(cargoFirmante) || 'Representante Legal'}<br>
    SINUGRAVAS S.A.S.</div>`;
  return body;
}
function certUpdatePreview(id){
  const s = state.solicitudes.find(x=>x.id===id);
  const u = state.users.find(x=>x.id===s.empleadoId);
  document.getElementById('certPreview').innerHTML = buildCertificadoTexto(s, u);
}
async function confirmarCertificado(id){
  const s = state.solicitudes.find(x=>x.id===id);
  const certificadoTexto = document.getElementById('certPreview').innerHTML;
  const fechaGeneracion = todayISO();

  const cfg = state.certConfig;
  await sb.from('cert_config').update({
    firmante: cfg.firmante, cargo_firmante: cfg.cargoFirmante, nit: cfg.nit, ciudad: cfg.ciudad
  }).eq('id', 1);

  const { error } = await sb.from('solicitudes').update({
    certificado_texto: certificadoTexto, estado:'Generado', fecha_generacion: fechaGeneracion
  }).eq('id', id);
  if(error){ toast('No se pudo generar el certificado: '+error.message,'error'); return; }

  s.certificadoTexto = certificadoTexto;
  s.estado = 'Generado';
  s.fechaGeneracion = fechaGeneracion;
  closeModal();
  toast('Certificado generado y enviado al apartado del empleado.');
  pintarSolicitudes();
}
function verCertificadoGenerado(id){
  const s = state.solicitudes.find(x=>x.id===id);
  openModal(`
    <div class="cert-doc">${s.certificadoTexto}</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="descargarCertificadoPDF('${id}')">📄 Descargar PDF</button>
    </div>
  `, true);
}
